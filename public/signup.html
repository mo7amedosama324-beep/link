<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Link Student Activity</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0a0f1e;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            padding: 40px 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(79, 142, 247, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(167, 139, 250, 0.08) 0%, transparent 50%);
            animation: bgFloat 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-30px, 30px) rotate(2deg); }
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.2;
            animation: float 8s ease-in-out infinite;
        }
        .blob-1 { width: 400px; height: 400px; background: #4f8ef7; top: -100px; left: -100px; }
        .blob-2 { width: 350px; height: 350px; background: #a78bfa; bottom: -80px; right: -80px; animation-delay: 3s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-30px); }
        }

        .signup-container {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 45px 40px;
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 1;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin: 20px auto;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #4f8ef7, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .logo-subtitle {
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
            font-weight: 400;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.6);
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
            color: #e2e8f0;
            font-weight: 400;
            font-family: 'Poppins', sans-serif;
        }

        input[type="password"] {
            padding-right: 50px;
        }

        .toggle-password {
            position: absolute;
            right: 18px;
            top: 43px;
            cursor: pointer;
            font-size: 1.2rem;
            user-select: none;
            opacity: 0.5;
            transition: opacity 0.3s ease;
        }

        .toggle-password:hover {
            opacity: 1;
        }

        input::placeholder {
            color: rgba(255,255,255,0.3);
        }

        input:focus {
            border-color: #4f8ef7;
            background: rgba(79, 142, 247, 0.08);
            box-shadow: 0 0 0 3px rgba(79, 142, 247, 0.1);
        }

        .btn-signup {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4f8ef7, #a78bfa);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            font-family: 'Poppins', sans-serif;
        }

        .btn-signup:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(79, 142, 247, 0.3);
        }

        .btn-signup:active {
            transform: translateY(0);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            display: none;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
        }

        .login-link a {
            color: #4f8ef7;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .login-link a:hover {
            color: #a78bfa;
            text-decoration: underline;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #4f8ef7;
        }

        .info-note {
            background: rgba(79, 142, 247, 0.1);
            border: 1px solid rgba(79, 142, 247, 0.3);
            color: rgba(255,255,255,0.7);
            padding: 14px 18px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-size: 0.85rem;
            text-align: center;
            line-height: 1.5;
        }

        .info-note strong {
            color: #4f8ef7;
            font-weight: 600;
        }

        @media (max-width: 480px) {
            body {
                padding: 20px 10px;
                align-items: flex-start;
            }

            .signup-container {
                padding: 35px 25px;
                margin: 10px auto;
            }

            h1 {
                font-size: 1.5rem;
            }

            .logo {
                font-size: 1.6rem;
            }

            .logo-section {
                margin-bottom: 30px;
            }

            .subtitle {
                font-size: 0.85rem;
            }

            input {
                padding: 12px 16px;
                font-size: 0.9rem;
            }

            input[type="password"] {
                padding-right: 45px;
            }

            .toggle-password {
                right: 15px;
                top: 41px;
                font-size: 1.1rem;
            }

            .btn-signup {
                padding: 12px;
                font-size: 0.95rem;
            }

            .blob {
                display: none;
            }

            .info-note {
                padding: 12px 14px;
                font-size: 0.8rem;
            }
        }

        @media (max-width: 360px) {
            .signup-container {
                padding: 30px 20px;
            }

            .logo-section {
                margin-bottom: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="signup-container">
        <div class="logo-section">
            <div class="logo">LINK</div>
            <div class="logo-subtitle">Student Activity Dashboard</div>
        </div>

        <h1>Create Account</h1>
        <p class="subtitle">Sign up to join the Link community</p>

        <div class="info-note">
            👁️ New accounts are created as <strong>Viewer</strong> (read-only).<br>
            Contact an administrator to upgrade your role.
        </div>

        <div class="error-message" id="errorMessage"></div>

        <form id="signupForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="name">Full Name (Optional)</label>
                <input type="text" id="name" name="name" placeholder="Your full name" autocomplete="name">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="At least 6 characters" required autocomplete="new-password">
                <span class="toggle-password" onclick="togglePasswordVisibility('password', this)">👁️</span>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter your password" required autocomplete="new-password">
                <span class="toggle-password" onclick="togglePasswordVisibility('confirmPassword', this)">👁️</span>
            </div>

            <button type="submit" class="btn-signup">🚀 Create Account</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="/login">Login here</a>
        </div>

        <a href="/" class="back-link">← Back to Home</a>
    </div>

    <script>
        // Toggle password visibility
        function togglePasswordVisibility(inputId, iconElement) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                iconElement.textContent = '🙈';
            } else {
                input.type = 'password';
                iconElement.textContent = '👁️';
            }
        }

        // Redirect if already logged in
        if (localStorage.getItem('token')) {
            window.location.href = '/dashboard';
        }

        const form = document.getElementById('signupForm');
        const errorDiv = document.getElementById('errorMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const name = document.getElementById('name').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Client-side validation
            if (password !== confirmPassword) {
                errorDiv.textContent = '❌ Passwords do not match!';
                errorDiv.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                errorDiv.textContent = '❌ Password must be at least 6 characters!';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ username, password, name })
                });

                const data = await response.json();

                if (response.ok) {
                    // Store token
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    // Success - redirect to dashboard
                    window.location.href = '/dashboard';
                } else {
                    errorDiv.textContent = '❌ ' + (data.error || 'Sign up failed. Please try again.');
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = '❌ Network error. Please check your connection.';
                errorDiv.style.display = 'block';
            }
        });

        // Hide error on input
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', () => {
                errorDiv.style.display = 'none';
            });
        });
    </script>
</body>
</html>
